name: uzh_fpv_trajectory

obs_dim: 6
action_dim: 3

env_runner:
  _target_: diffusion_policy.env_runner.uav_combat_offline_runner.UAVCombatOfflineRunner
  dataset: ${..dataset}
  batch_size: 64
  num_workers: 0
  pin_memory: True
  device: ${training.device}
  max_batches: 10
  save_plots: True
  plot_dir: plots
  plot_interval: 10
  plot_num_samples: 2
  plot_action: False
  plot_curves: True
  curve_log_path: logs.json.txt

dataset:
  _target_: diffusion_policy.dataset.uav_combat_lowdim_dataset.UAVCombatLowdimDataset
  zarr_path: ${hydra:runtime.cwd}/data/uzh_fpv/uzh_fpv_25hz_delta.zarr
  obs_slice: [0, 6]
  horizon: ${horizon}
  pad_before: 0
  pad_after: 0
  seed: 42
  val_ratio: 0.17
