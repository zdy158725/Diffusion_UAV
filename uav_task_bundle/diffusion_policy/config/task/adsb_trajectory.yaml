name: adsb_trajectory

obs_dim: 9
action_dim: 3

env_runner:
  _target_: diffusion_policy.env_runner.uav_combat_offline_runner.UAVCombatOfflineRunner
  dataset: ${..dataset}
  batch_size: 128
  num_workers: 0
  pin_memory: True
  device: ${training.device}
  max_batches: 20
  save_plots: True
  plot_dir: plots
  plot_interval: 5
  plot_num_samples: 2
  plot_action: False
  plot_curves: True
  curve_log_path: logs.json.txt

dataset:
  _target_: diffusion_policy.dataset.uav_combat_lowdim_dataset.UAVCombatLowdimDataset
  zarr_path: ${hydra:runtime.cwd}/data/adsb/adsb_7days2_fixedref_wind9d.zarr
  obs_slice: [0, 9]
  horizon: ${horizon}
  pad_before: 0
  pad_after: 0
  seed: 42
  val_ratio: 0.1
